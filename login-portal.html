<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#020617;
font-family:system-ui,Arial;
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center text-white">

<div class="w-full max-w-sm bg-slate-900 p-6 rounded-2xl border border-slate-700">

<h2 class="text-xl font-semibold text-center mb-4">
Akses Portal
</h2>

<input
id="pass"
type="password"
placeholder="Masukkan password"
class="w-full p-3 rounded-lg bg-slate-950 border border-slate-700 mb-3">

<button
onclick="login()"
class="w-full bg-indigo-600 p-3 rounded-lg font-semibold">
Masuk
</button>

<p id="err" class="text-red-400 text-sm mt-3 hidden">
Password salah
</p>

</div>

<script>

const PASSWORD="rusun2026";

function login(){

const p=document.getElementById("pass").value;

if(p===PASSWORD){

sessionStorage.setItem("portalLogin","true");
location.href="portal.html";

}else{

document.getElementById("err").classList.remove("hidden");

}

}

</script>

</body>
</html>
